{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebSense</title>
  <link rel="stylesheet" href="{% static 'scanner/styles.css' %}">
</head>
<body>
  <header class="siteHeader">
    <div class="brand">
      <div class="logo" aria-hidden="true">W</div>
      <div>
        <h1 class="title">WebSense</h1>
        <p class="subtitle">Check a link before you click. Clear advice, not tech jargon.</p>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="card card--input" aria-label="Link checker">
      <label for="url" class="label">Website link</label>
      <input id="url" class="input" type="text" inputmode="url"
             placeholder="Paste a link like https://example.com" autocomplete="off" />

      <div class="row">
        <button id="scanBtn" class="btn btn--primary">Check link</button>
        <button id="clearBtn" type="button" class="btn btn--ghost">Clear</button>
      </div>

      <p class="help">
        Tip: If this came from a message, be extra careful with login or payment links.
      </p>
    </section>

    <section id="result" class="card" style="display:none;" aria-live="polite"></section>

    <footer class="footer">
      <p class="footerText">WebSense gives guidance. You’re still in control of the decision.</p>
    </footer>
  </main>

  <script>
    const urlInput = document.getElementById("url");
    const resultEl = document.getElementById("result");
    const scanBtn = document.getElementById("scanBtn");
    const clearBtn = document.getElementById("clearBtn");

    function escapeHtml(s) {
      return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
    }

    // Map backend state into simple language for the user
    function uiForState(stateRaw) {
      const state = String(stateRaw || "").toUpperCase();

      if (state === "UNSAFE") {
        return {
          tone: "no",
          pill: "UNSAFE",
          headline: "Likely phishing. Avoid this link.",
          action: "Close the page. Do not enter any information.",
          steps: [
            "Do not log in or pay on this site.",
            "If you already entered details, change your password and turn on 2-step verification.",
            "If this came from someone you know, message them separately to confirm."
          ],
          confidence: "High"
        };
      }
      if (state === "BE_CAREFUL") {
        return {
          tone: "careful",
          pill: "SUSPICIOUS",
          headline: "Something looks off.",
          action: "Do not enter passwords or payment details until you verify it’s real.",
          steps: [
            "Search the company name yourself (don’t use the link).",
            "Check the website address for spelling tricks.",
            "If unsure, don’t use it."
          ],
          confidence: "Medium"
        };
      }
      return {
        tone: "ok",
        pill: "SAFE",
        headline: "No known signs of phishing.",
        action: "Still double-check before you log in or pay.",
        steps: [
          "Only continue if you expected this link.",
          "For banking or shopping, use your saved bookmark instead.",
          "If anything feels wrong, leave the page."
        ],
        confidence: "Medium"
      };
    }

    // Convert technical signals into 1 to 2 simple reasons
    function topReasons(data) {
      const reasons = [];
      const raw = data?.reasons || {};

      for (const key of Object.keys(raw)) {
        const value = raw[key];

        if (key === "safe_browsing") { reasons.push("A trusted safety service flagged this link."); continue; }
        if (key === "openphish") { reasons.push("This link matches a known phishing feed."); continue; }
        if (key === "tls") { reasons.push("This site does not look securely set up."); continue; }
        if (key === "tls_expired") { reasons.push("This site’s security certificate is expired."); continue; }
        if (key === "tls_expiry_soon") { reasons.push("This site’s security certificate is about to expire."); continue; }

        if (key === "heuristics") {
          if (Array.isArray(value)) {
            for (const r of value) {
              const rr = String(r || "").toLowerCase();
              if (rr.includes("long url")) reasons.push("The link is unusually long.");
              else if (rr.includes("subdomain")) reasons.push("The website address looks unusual or confusing.");
              else reasons.push("The link has suspicious patterns.");
            }
          } else {
            reasons.push("The link has suspicious patterns.");
          }
        }
      }

      return reasons.slice(0, 2);
    }

    function riskLabel(stateRaw) {
      const s = String(stateRaw || "").toUpperCase();
      if (s === "UNSAFE") return "High risk";
      if (s === "BE_CAREFUL") return "Medium risk";
      return "Low risk";
    }

    function renderResult(data) {
      const card = uiForState(data?.state);
      const reasons = topReasons(data);
      const hasWhy = reasons.length > 0;

      // ✅ tint whole card
      resultEl.className = `card result ${card.tone}`;

      const reasonsHtml = reasons.map(r => `<li>${escapeHtml(r)}</li>`).join("");
      const stepsHtml = card.steps.map(s => `<li>${escapeHtml(s)}</li>`).join("");

      const detailsJson = JSON.stringify({ checks: data?.checks || {} }, null, 2);

      resultEl.innerHTML = `
        <div class="resultTop">
          <div class="statusPill ${card.tone}">
            <span class="dot" aria-hidden="true"></span>
            <span>${escapeHtml(card.pill)}</span>
          </div>

          <div class="meta">
            <div class="metaItem"><span class="metaLabel">Risk</span> <span class="metaValue">${escapeHtml(riskLabel(data?.state))}</span></div>
            <div class="metaItem"><span class="metaLabel">Confidence</span> <span class="metaValue">${escapeHtml(card.confidence)}</span></div>
          </div>
        </div>

        <h2 class="headline">${escapeHtml(card.headline)}</h2>
        <p class="action">${escapeHtml(card.action)}</p>

        <div class="actionBox">
          <div class="actionBoxTitle">What you should do</div>
          <ul class="list">${stepsHtml}</ul>
        </div>

        ${hasWhy ? `
          <div class="panel">
            <button type="button" class="linkBtn" id="whyBtn">Why am I seeing this?</button>
            <div id="whyWrap" class="panelBody" style="display:none;">
              <ul class="list">${reasonsHtml}</ul>
            </div>
          </div>
        ` : ""}

        <div class="panel">
          <button type="button" class="linkBtn" id="detailsBtn">Show technical details</button>
          <div id="detailsWrap" class="panelBody" style="display:none;">
            <pre>${escapeHtml(detailsJson)}</pre>
          </div>
        </div>
      `;

      function toggle(el, btn, showText, hideText) {
        const open = el.style.display !== "none";
        el.style.display = open ? "none" : "block";
        btn.textContent = open ? showText : hideText;
      }

      const detailsBtn = document.getElementById("detailsBtn");
      const detailsWrap = document.getElementById("detailsWrap");
      detailsBtn.onclick = () => toggle(detailsWrap, detailsBtn, "Show technical details", "Hide technical details");

      if (hasWhy) {
        const whyBtn = document.getElementById("whyBtn");
        const whyWrap = document.getElementById("whyWrap");
        whyBtn.onclick = () => toggle(whyWrap, whyBtn, "Why am I seeing this?", "Hide explanation");
      }

      resultEl.style.display = "block";
    }

    function renderChecking() {
      // ✅ tinted checking state
      resultEl.className = "card result careful";
      resultEl.innerHTML = `
        <div class="resultTop">
          <div class="statusPill careful">
            <span class="dot" aria-hidden="true"></span>
            <span>CHECKING</span>
          </div>
        </div>
        <h2 class="headline">Checking…</h2>
        <p class="action">Please wait.</p>
      `;
      resultEl.style.display = "block";
    }

    function renderError(msg) {
      // ✅ tinted error state
      resultEl.className = "card result no";
      resultEl.innerHTML = `
        <div class="resultTop">
          <div class="statusPill no">
            <span class="dot" aria-hidden="true"></span>
            <span>ERROR</span>
          </div>
        </div>
        <h2 class="headline">${escapeHtml(msg)}</h2>
        <p class="action">Try again with a full link like https://example.com</p>
      `;
      resultEl.style.display = "block";
    }

    scanBtn.addEventListener("click", async () => {
      const url = urlInput.value.trim();

      // ✅ no ugly error card on empty input
      if (!url) {
        urlInput.classList.add("inputError");
        urlInput.focus();
        return;
      }
      urlInput.classList.remove("inputError");

      renderChecking();

      try {
        const res = await fetch("/api/scan/", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url })
        });

        const data = await res.json();
        if (!res.ok) { renderError(data?.error || "Scan failed."); return; }

        renderResult(data);
      } catch (err) {
        renderError("Request failed.");
      }
    });

    clearBtn.addEventListener("click", () => {
      urlInput.value = "";
      resultEl.style.display = "none";
      resultEl.innerHTML = "";
      // reset class so next result uses tint correctly
      resultEl.className = "card";
      urlInput.classList.remove("inputError");
      urlInput.focus();
    });
  </script>
</body>
</html>
